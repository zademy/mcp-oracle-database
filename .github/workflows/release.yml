name: Release

on:
  push:
    branches: [master]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - run: git fetch --tags --force
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '26'
          cache: maven
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN
      - name: CalVer tag (YYYY.MM.DD.N)
        run: |
          D=$(date -u +%Y.%m.%d)
          N=$(($(git tag -l "$D.*" | wc -l)+1))
          echo "TAG=$D.$N" >> $GITHUB_ENV
      - name: Set Maven version + deploy to GitHub Packages
        run: mvn -B -ntp versions:set -DnewVersion=$TAG -DgenerateBackupPoms=false deploy -DskipTests
      - name: GitHub Release + JAR asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: Release ${{ env.TAG }}
          generate_release_notes: true
          files: target/*.jar
