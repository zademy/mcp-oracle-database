name: CI

on:
  pull_request:
    branches: [master, develop]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '26'
          cache: maven
      - run: mvn -B -Dmaven.test.skip=true
